name: Update BIOTOOLS.md

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-biotools:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate BIOTOOLS.md
        run: |
          python .github/scripts/match_biotools.py \
            --format markdown \
            --output BIOTOOLS.md \
            --no-cache

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update BIOTOOLS.md"
          title: "chore: update BIOTOOLS.md"
          body: |
            Automated weekly update of `BIOTOOLS.md`.

            This file maps tools in this repository to their entries in the
            [bio.tools](https://bio.tools) registry.

            *Generated by the [Update BIOTOOLS.md](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update_biotools.yml) workflow.*
          branch: auto/update-biotools-md
          labels: biotools
          delete-branch: true
